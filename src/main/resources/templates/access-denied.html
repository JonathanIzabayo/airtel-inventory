<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Denied - Airtel Rwanda</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg, #E31E24 0%, #8B0000 100%);height:100vh;display:flex;justify-content:center;align-items:center;}
        .container{background:white;border-radius:15px;padding:40px;max-width:500px;text-align:center;}
        h1{color:#E31E24;font-size:72px;}
        h2{color:#333;margin-bottom:20px;}
        p{color:#666;margin-bottom:30px;}
        .btn{display:inline-block;padding:12px 24px;background-color:#E31E24;color:white;text-decoration:none;border-radius:6px;margin:0 10px;}
        .btn:hover{background-color:#C8102E;}
        .btn-secondary{background-color:#6c757d;}
    </style>
</head>
<body>
    <div class="container">
        <h1>403</h1>
        <h2>Access Denied</h2>
        <p>You don't have permission to access this page.<br>This area is restricted.</p>
        <a href="/dashboard" class="btn">Go to Dashboard</a>
        <a href="/logout" class="btn btn-secondary">Logout</a>
    </div>
</body>
</html>
